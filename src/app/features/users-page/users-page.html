<div class="conteudo">
  <div class="tittle">
    <button class="button-back" routerLink="/habits">
      <img src="assets/png/icon-back.png" alt="" />
      Voltar para Hábitos
    </button>

    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h2>Usúarios</h2>
        <p>Gerencie seus usuários e acompanhe o status.</p>
      </div>

      <button class="create-user" routerLink="/create-user">
        <img src="assets/png/icon-plus.png" alt="" />Criar Usuário
      </button>
    </div>
  </div>

  <div class="infos">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <table mat-table [dataSource]="dataSource">
    <!-- Nome -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td class="name" mat-cell *matCellDef="let element">{{ element.nome }}</td>
    </ng-container>

    <!-- Email -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">{{ element.email }}</td>
    </ng-container>

    <!-- Telefone -->
    <ng-container matColumnDef="telefone">
      <th mat-header-cell *matHeaderCellDef>Telefone</th>
      <td mat-cell *matCellDef="let element">{{ element.telefone }}</td>
    </ng-container>

    <!-- status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">{{ element.status }}</td>
    </ng-container>

    <!-- perfil -->
    <ng-container matColumnDef="perfil">
      <th mat-header-cell *matHeaderCellDef>Perfil</th>
      <td mat-cell *matCellDef="let element">{{ element.perfil }}</td>
    </ng-container>

    <!-- acoes -->
    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Ações</th>
      <td class="actions" mat-cell *matCellDef="let element">
        <img src="assets/png/icon-edit.png" alt="Editar" />
        <img src="assets/png/icon-delete-user.png" alt="" />
      </td>
    </ng-container>

    <!-- Header -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

    <!-- Linhas -->
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
