<div class="container-fluid">
  <div class="tittle">
    <button class="button-back" routerLink="/habits">
      <img src="assets/png/icon-back.png" alt="" />
      Voltar para lista
    </button>

    <h2>Criar Usúario</h2>
    <p>Preencha os dados para cadastrar um novo usuário no sistema.</p>
  </div>

  <div class="background">
    <main class="conteudo">
      <div class="tittle-form">
        <img src="assets/png/icon-user.png" alt="" />
        Informações Pessoais
      </div>

      <div class="row mt-4">
        <div class="col-12">
          <label for="nome" class="form-label">Nome Completo</label>
          <input
            type="text"
            id="nome"
            class="form-control"
            placeholder="Nome completo do usúario"
          />
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-6">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" id="email" class="form-control" placeholder="email@exemplo.com" />
        </div>

        <div class="col-6">
          <label for="telefone" class="form-label">Telefone</label>
          <input type="text" id="telefone" class="form-control" placeholder="(00) 00000-0000" />
        </div>
      </div>

      <div class="tittle-form mt-4">
        <img src="assets/png/icon-security.png" alt="" />
        Segurança
      </div>

      <div class="row mt-4">
        <div class="col-6">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••" />
        </div>

        <div class="col-6">
          <label for="confirmarSenha" class="form-label">Confirmar senha</label>
          <input type="password" id="confirmarSenha" class="form-control" placeholder="••••••••" />
        </div>
      </div>

      <div class="tittle-form mt-4">
        <img src="assets/png/icon-settings.png" alt="" />
        Configurações
      </div>

      <div class="row mt-4">
        <div class="col-6">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" id="senha" class="form-control" placeholder="••••••••" />
        </div>

        <div class="col-6">
          <label for="confirmarSenha" class="form-label">Confirmar senha</label>
          <input type="password" id="confirmarSenha" class="form-control" placeholder="••••••••" />
        </div>
      </div>
    </main>
    <div class="buttons">
      <div class="col d-flex justify-content-end gap-2">
        <button class="btn cancel">Cancelar</button>
        <button class="btn create d-flex gap-2 align-items-center">
          <img src="assets/png/icon-create-user.png" alt="" />Criar usuário
        </button>
      </div>
    </div>
  </div>
</div>
