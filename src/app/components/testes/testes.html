<div class="content">
  <input type="text" (input)="filterList($event)" />

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <!-- ID -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let professor">{{ professor.id }}</td>
    </ng-container>

    <!-- Nome -->
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let professor">{{ professor.nome }}</td>
    </ng-container>

    <!-- Matéria -->
    <ng-container matColumnDef="materia">
      <th mat-header-cell *matHeaderCellDef>Matéria</th>
      <td mat-cell *matCellDef="let professor">{{ professor.materia }}</td>
    </ng-container>

    <!-- Status -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let professor">{{ professor.status }}</td>
    </ng-container>

    <!-- Header e Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
