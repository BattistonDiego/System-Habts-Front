<div class="conteudo">
  <button class="button-back" routerLink="/habits">
    <img src="assets/png/icon-back.png" alt="" />
    Voltar para Hábitos
  </button>
  <div class="perfil">
    <div class="logo">{{ usuario.nome.charAt(0) }}</div>
    <div class="message">
      <span>Good morning, Diego</span>
      <p>Hoje é {{ getDataFormatada() }}</p>
    </div>
  </div>
  <div class="infos">
    <app-card
      *ngFor="let card of listCards"
      [description]="card.description"
      [complement]="card.complement"
      [icon]="card.icon"
      width="220px"
      height="99px"
    ></app-card>
  </div>
  <section class="details">
    <div class="habitos">
      <h2>Hábitos por dia</h2>
      <canvas baseChart [data]="barChartData" [type]="'bar'" [options]="barChartOptions"> </canvas>
    </div>
    <div class="desempenho">
      <h2>Desempenho</h2>
      <div class="chart-container">
        <canvas
          baseChart
          [data]="doughnutData"
          [type]="'doughnut'"
          [options]="doughnutOptions"
        ></canvas>
        <div class="chart-label">{{ progress }}%</div>
      </div>
      <div class="desempenho-cards">
        <div class="desempenho-card">
          <lucide-icon name="zap" [size]="18" class="icon yellow"></lucide-icon>
          <span class="valor">{{ bestSequencia }}</span>
          <span class="label">Melhor Seq.</span>
        </div>
        <div class="desempenho-card">
          <lucide-icon name="target" [size]="18" class="icon blue"></lucide-icon>
          <span class="valor">{{ qntdEsteMes }}</span>
          <span class="label">Este Mês</span>
        </div>
        <div class="desempenho-card">
          <lucide-icon name="award" [size]="18" class="icon green"></lucide-icon>
          <span class="valor">{{ mediaHabitosCompletados }}%</span>
          <span class="label">Taxa Média</span>
        </div>
      </div>
    </div>
  </section>
  <section class="atividades-recentes">
    <div class="card-atividade">
      <h2>Atividade recente</h2>
      <div class="calendar">
        <div class="labels-dias">
          <span></span>
          <span>Seg</span>
          <span></span>
          <span>Qua</span>
          <span></span>
          <span>Sex</span>
          <span></span>
        </div>
        <div class="semana" *ngFor="let semana of semanas">
          <div
            *ngFor="let dia of semana"
            class="dia"
            [style.background]="dia.qntd === -1 ? 'transparent' : getColor(dia.qntd)"
            [title]="formatarData(dia.data)"
          ></div>
        </div>
      </div>
    </div>
  </section>
</div>
