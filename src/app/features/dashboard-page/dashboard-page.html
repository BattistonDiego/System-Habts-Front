<div class="conteudo">
  <button class="button-back" routerLink="/habits">
    <img src="assets/png/icon-back.png" alt="" />
    Voltar para Hábitos
  </button>
  <div class="perfil">
    <div class="logo">{{ usuario.nome.charAt(0) }}</div>
    <div class="message">
      <span>Good morning, Diego</span>
      <p>Hoje é segunda-feira, 27 de abri</p>
    </div>
  </div>
  <div class="infos">
    <!-- colocar o component card aqui -->
    <app-card
      *ngFor="let card of listCards"
      [description]="card.description"
      [complement]="card.complement"
      [icon]="card.icon"
      width="220px"
      height="99px"
    ></app-card>
  </div>
  <section class="details">
    <div class="habitos">
      <h2>Hábitos por dia</h2>
      <canvas baseChart [data]="barChartData" [type]="'bar'" [options]="barChartOptions"> </canvas>
    </div>
    <div class="desempenho">
      <h2>Desempenho</h2>
      <div class="chart-container">
        <canvas
          baseChart
          [data]="doughnutData"
          [type]="'doughnut'"
          [options]="doughnutOptions"
        ></canvas>
        <div class="chart-label">{{ progress }}%</div>
      </div>
    </div>
  </section>
  <section class="atividades-recentes"></section>
</div>
